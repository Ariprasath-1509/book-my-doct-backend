spring.application.name=Book-My-Doct

server.port=${PORT:8081}

# Database — set DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD in Render
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/bookMyDoctor?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&CreateIfNotExist=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root@123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS — comma-separated list of allowed frontend origins; set in Render env vars
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Mail — set MAIL_USERNAME / MAIL_PASSWORD in Render
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio — set in Render env vars
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# Razorpay — set in Render env vars
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=BookMyDoct
info.app.description=Healthcare Appointment Booking Platform
info.app.version=1.0.0
info.app.developer=Avinash Raj

# Logging
logging.level.root=INFO
logging.level.com.bookmydoct=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{40} - %msg%n
