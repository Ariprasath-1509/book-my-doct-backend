<!DOCTYPE html>
<html>
<head>
    <title>BookMyDoct Payment Test</title>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<h2>BookMyDoct Razorpay Test</h2>

<button onclick="payNow()">
    Pay Consultation Fee
</button>

<script>

    async function payNow() {

        const response = await fetch(
            "http://localhost:8081/api/payments/initiate",
            {
                method: "POST",
                headers: {
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    appointmentUuid:
                        "PUT_APPOINTMENT_UUID_HERE",

                    paymentMethod:
                        "RAZORPAY"
                })
            });

        const order =
            await response.json();

        const paymentData =
            order.data;

        const options = {

            key:
            paymentData.keyId,

            amount:
                paymentData.amount * 100,

            currency:
            paymentData.currency,

            name:
                "BookMyDoct",

            description:
                "Doctor Consultation",

            order_id:
            paymentData.razorpayOrderId,

            handler:
                async function(response) {

                    await fetch(
                        "http://localhost:8081/api/payments/verify",
                        {
                            method:"POST",

                            headers:{
                                "Content-Type":"application/json"
                            },

                            body: JSON.stringify({

                                razorpayOrderId:
                                response.razorpay_order_id,

                                razorpayPaymentId:
                                response.razorpay_payment_id,

                                razorpaySignature:
                                response.razorpay_signature
                            })
                        });

                    alert(
                        "Payment Successful");
                }
        };

        const rzp =
            new Razorpay(options);

        rzp.open();
    }

</script>

</body>
</html>
